<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Jelek Tapi Nyambung</title>
<style>
  body {background:#1e1e2e; color:white; font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
  .chat {background:#2d2d44; width:360px; height:500px; border-radius:16px; display:flex; flex-direction:column; overflow:hidden;}
  .header {background:#7c3aed; padding:15px; text-align:center; font-weight:bold;}
  .box {flex:1; padding:10px; overflow-y:auto;}
  .user {background:#3b82f6; padding:8px 12px; border-radius:10px; margin:5px 0; align-self:flex-end; max-width:80%;}
  .ai {background:#4b5563; padding:8px 12px; border-radius:10px; margin:5px 0; align-self:flex-start; max-width:80%;}
  .input {display:flex; padding:10px; background:#1e1e2e;}
  input {flex:1; padding:10px; border:none; border-radius:8px;}
  button {margin-left:8px; padding:10px 15px; background:#7c3aed; border:none; border-radius:8px; color:white; cursor:pointer;}
</style>
</head>
<body>
<div class="chat">
  <div class="header">AI Jelek v1.0</div>
  <div class="box" id="chatBox"></div>
  <div class="input">
    <input type="text" id="pesan" placeholder="Tanya apa aja...">
    <button onclick="kirim()">Kirim</button>
  </div>
</div>

<script>
const jawaban = [
  "halo juga",
  "kita mah ngapain nih?",
  "oh mau curhat ya? yaudah gw dengerin",
  "yang sabar ya",
  "oh kalo tentang ai sih",
  "Hmm menurut gue sih gitu... tapi gue juga gak tau bener apa enggak",
  "Pertanyaan bagus. Jawaban gue: mungkin iya, mungkin enggak",
  "Oalah itu mah gampang. Tinggal... eh lupa caranya",
  "Gue AI jelek, tapi setidaknya gue berusaha nyambung",
  "Itu bisa. Caranya? Rahasia perusahaan",
  "sabar nyet otak gw error",
  "Bro pertanyaannya dalem banget. Otak gue nge-lag dulu ya",
  "Intinya: semua akan baik-baik aja. Kecuali kalau enggak",
  "yaudah bye assalamualaikum",
  "jaga diri baik-baik ya",
  "tenang gw baik² aja kok",
  "please wait",
  "sistem error 404",
  "woy santai dong babi"
];

function kirim(){
  let input = document.getElementById('pesan');
  let chatBox = document.getElementById('chatBox');
  let teks = input.value.trim();
  if(teks === "") return;

  // Tampilkan pesan user
  chatBox.innerHTML += `<div class="user">${teks}</div>`;
  
  // AI jawab random 1 detik kemudian biar berasa "mikirl"
  setTimeout(() => {
    let jawab = jawaban[Math.floor(Math.random() * jawaban.length)];
    chatBox.innerHTML += `<div class="ai">${jawab}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
  }, 1000);

  input.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
